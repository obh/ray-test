services:
  # --- Infrastructure ---
  redis:
    image: redis:7-alpine
    container_name: convergence_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  temporal:
    image: temporalio/auto-setup:latest
    container_name: convergence_temporal
    ports:
      - "7233:7233"     # gRPC frontend
    environment:
      - DB=sqlite
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  temporal-ui:
    image: temporalio/ui:latest
    container_name: convergence_temporal_ui
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233

  postgres:
    image: postgres:16-alpine
    container_name: convergence_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=convergence
      - POSTGRES_USER=convergence
      - POSTGRES_PASSWORD=convergence
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U convergence"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Application ---
  convergence-server:
    build: .
    container_name: convergence_server
    ports:
      - "8000:8000"
      - "8265:8265"
    shm_size: '3gb'
    volumes:
      - .:/app
    environment:
      - RAY_COLOR_PREFIX=1
      - RAY_SERVE_HTTP_HOST=0.0.0.0
      - RAY_SERVE_HTTP_PORT=8000
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-2}
      - S3_LANCE_PATH=${S3_LANCE_PATH:-s3://yashwant-test/linkedin_profiles.lance}
      - REDIS_URL=redis://redis:6379
      - TEMPORAL_URL=temporal:7233
      - USE_TEMPORAL=${USE_TEMPORAL:-false}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-lance}
      - DATABASE_URL=postgresql://convergence:convergence@postgres:5432/convergence
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  temporal-worker:
    build: .
    container_name: convergence_temporal_worker
    volumes:
      - .:/app
    environment:
      - REDIS_URL=redis://redis:6379
      - TEMPORAL_URL=temporal:7233
      - STORAGE_BACKEND=${STORAGE_BACKEND:-lance}
      - DATABASE_URL=postgresql://convergence:convergence@postgres:5432/convergence
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-2}
      - S3_LANCE_PATH=${S3_LANCE_PATH:-s3://yashwant-test/linkedin_profiles.lance}
    command: python temporal_workflow.py
    depends_on:
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy

volumes:
  pgdata:
